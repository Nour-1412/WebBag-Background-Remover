<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إزالة خلفية الصور مجانًا | WebBag</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/browser.js"></script>
</head>
<body>

<div class="container">
  <h1>إزالة خلفية الصور مجانًا</h1>

  <div id="preview"></div>

  <a id="downloadBtn" download="webbag-background-removed.png">
    تنزيل الصورة
  </a>
</div>

<script src="app.js"></script>

</body>
</html>
