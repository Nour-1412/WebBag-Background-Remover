<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إزالة الخلفية من الصور | WebBag</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>🖼️ إزالة الخلفية من الصور</h1>

            <p>
                أزل خلفية أي صورة خلال ثوانٍ باستخدام الذكاء الاصطناعي،
                مجانًا وبدون رفع صورك إلى أي خادم خارجي.
            </p>

        </div>

        <div class="upload-card">

            <div class="upload-icon">
                ☁️
            </div>

            <h2>اسحب الصورة هنا أو اختر صورة</h2>

            <input
                type="file"
                id="imageInput"
                accept="image/*"
            >

        </div>

        <div class="preview-section">

            <div class="preview-box">
                <h3>الصورة الأصلية</h3>
                <img id="originalPreview">
            </div>

            <div class="preview-box">
                <h3>بعد إزالة الخلفية</h3>
                <img id="resultPreview">
            </div>

        </div>

        <button id="removeBtn">
            إزالة الخلفية
        </button>

        <button id="downloadBtn">
            تحميل الصورة PNG
        </button>

    </div>

    <script src="app.js"></script>

</body>
</html>
