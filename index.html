<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إزالة الخلفية من الصور بالذكاء الاصطناعي | WebBag</title>

    <meta name="description"
        content="أزل خلفية أي صورة خلال ثوانٍ باستخدام الذكاء الاصطناعي مجانًا وبدون رفع الصور إلى أي خادم خارجي.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>
            إزالة الخلفية من الصور بالذكاء الاصطناعي
        </h1>

        <p class="description">
            أزل خلفية أي صورة خلال ثوانٍ باستخدام الذكاء الاصطناعي،
            مجانًا وبدون رفع صورك إلى أي خادم خارجي.
        </p>

        <div class="upload-box">

            <input
                type="file"
                id="imageInput"
                accept="image/*"
            >

            <p>
                اختر صورة للبدء
            </p>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
