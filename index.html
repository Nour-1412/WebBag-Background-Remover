<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>إزالة خلفية الصور مجانًا | WebBag</title>

  <meta name="description" content="أداة WebBag المجانية لإزالة خلفية الصور بالذكاء الاصطناعي مباشرة من المتصفح دون الحاجة إلى برامج أو تسجيل حساب.">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>إزالة خلفية الصور مجانًا</h1>

    <p>
      ارفع صورتك ودع الذكاء الاصطناعي يزيل الخلفية تلقائيًا خلال ثوانٍ.
    </p>

    <input type="file" id="imageInput" accept="image/*">

    <button id="removeBtn">
      إزالة الخلفية
    </button>

    <div id="preview"></div>

    <a id="downloadBtn"
       download="webbag-background-removed.png"
       style="display:none;">
      تنزيل الصورة
    </a>

  </div>

  <script type="module" src="app.js"></script>

</body>

</html>
<p class="note">
  الصيغ المدعومة: JPG و PNG فقط — الحد الأقصى لحجم الصورة: 5 ميجابايت.
</p>
